[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "quantfore-research"
version = "0.1.0"
description = "Research data foundation for the Quantfore AI proof engine."
requires-python = ">=3.9"
dependencies = [
  "pandas-market-calendars>=5.1,<5.2",
  "SQLAlchemy>=2.0,<3.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0,<9.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["quantfore_research*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
